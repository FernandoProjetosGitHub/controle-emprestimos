name: Build desktop installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "controle-emprestimos/**"
      - ".github/workflows/build-desktop.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controle-emprestimos/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        working-directory: controle-emprestimos
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: controle-emprestimos

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: controle-emprestimos-windows
          path: |
            controle-emprestimos/src-tauri/target/release/bundle/nsis/*.exe
