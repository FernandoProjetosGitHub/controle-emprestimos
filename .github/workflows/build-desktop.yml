name: Build desktop installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "controle-emprestimos/**"
      - ".github/workflows/build-desktop.yml"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: controle-emprestimos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controle-emprestimos/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run desktop:build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: controle-emprestimos-windows
          path: |
            controle-emprestimos/src-tauri/target/release/bundle/nsis/*.exe
            controle-emprestimos/src-tauri/target/release/bundle/msi/*.msi
